# mac-power-utils configuration
#
# Copy is installed to:
#   ~/.config/mac-power-utils/mac-power-utils.conf
#
# Environment variables still work and take precedence.

# edge-mem-guard
EDGE_MEM_GUARD_THRESHOLD_MB=4096
EDGE_MEM_GUARD_WARN_PCT=80
EDGE_MEM_GUARD_CHECK_INTERVAL_SEC=30

# zoom-guard
ZOOM_GUARD_IDLE_TIMEOUT_MIN=5
ZOOM_GUARD_THROTTLE_ON_BATTERY=true
ZOOM_GUARD_CHECK_INTERVAL_SEC=15

# battery-throttle
BATTERY_THROTTLE_CHECK_INTERVAL_SEC=60
BATTERY_THROTTLE_EDGE_PRIORITY=10
BATTERY_THROTTLE_ZOOM_PRIORITY=10

# ollama-guard
OLLAMA_GUARD_IDLE_TIMEOUT_MIN=10
OLLAMA_GUARD_CHECK_INTERVAL_SEC=30
OLLAMA_GUARD_API_URL=http://localhost:11434

# front-guard
FRONT_GUARD_MEMORY_THRESHOLD_MB=512
FRONT_GUARD_BACKGROUND_TIMEOUT_MIN=15
FRONT_GUARD_CHECK_INTERVAL_SEC=30
